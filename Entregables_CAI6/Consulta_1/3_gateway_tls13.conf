# Gateway Reverse Proxy para 46 microservicios con terminacion TLS centralizada.

upstream ms_historial {
    server 10.0.0.10:8080 max_fails=3 fail_timeout=10s;
}

upstream ms_farmacia {
    server 10.0.0.11:8080 max_fails=3 fail_timeout=10s;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.salud.gov;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.salud.gov;

    # Certificado DV del Gateway (punto unico de gestion PKI para los microservicios).
    ssl_certificate /etc/letsencrypt/live/api.salud.gov/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.salud.gov/privkey.pem;

    # Endurecimiento TLS 1.3.
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Revocacion y cadena de confianza (si la CA lo soporta).
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;
    resolver_timeout 5s;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    proxy_http_version 1.1;
    proxy_read_timeout 60s;
    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;

    location /historial/ {
        proxy_pass http://ms_historial/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Request-Id $request_id;
    }

    location /farmacia/ {
        proxy_pass http://ms_farmacia/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Request-Id $request_id;
    }

    # Patrón recomendado para escalar a los 46 microservicios.
    include /etc/nginx/conf.d/microservices/*.conf;
}
